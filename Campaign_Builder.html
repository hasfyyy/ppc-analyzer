<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Campaign Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  :root{
    --pink:#ec4899; --pink-dark:#db2777; --purple:#a855f7;
    --grad:linear-gradient(135deg,#ec4899,#a855f7);
    --grad-red:linear-gradient(135deg,#f43f5e,#e11d48);
    --green:#16a34a; --amber:#f59e0b; --red:#ef4444;
    --bg:#f4f5f7; --card:#ffffff; --ink:#1f2937; --muted:#9aa3af; --muted2:#6b7280;
    --border:#e7e9ee; --border2:#eef0f4; --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); font-size:13px;}
  a{color:var(--pink-dark); text-decoration:none;}
  .wrap{max-width:1560px; margin:0 auto; padding:18px 22px 80px;}

  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .topbar h1{font-size:16px; margin:0; font-weight:800;}
  .topbar a.backlink{font-size:12.5px; font-weight:600; color:var(--muted2); border:1px solid var(--border); background:#fff; padding:7px 12px; border-radius:9px;}
  .topbar a.backlink:hover{background:#f6f7f9; color:var(--ink);}

  /* nav */
  .navrow{display:flex; justify-content:center; margin:6px 0 12px;}
  .nav{display:flex; gap:2px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:5px; box-shadow:var(--shadow); overflow-x:auto; max-width:100%;}
  .navbtn{border:none; background:none; padding:8px 13px; font-size:13px; font-weight:600; color:var(--muted2); cursor:pointer; border-radius:9px; white-space:nowrap; display:flex; align-items:center; gap:6px; transition:.12s;}
  .navbtn:hover{background:#f6f2fb; color:var(--ink);}
  .navbtn.active{background:var(--grad); color:#fff; box-shadow:0 2px 8px rgba(219,39,119,.35);}

  .card{background:var(--card); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow);}
  .card.pad{padding:14px 16px;}
  .card + .card{margin-top:14px;}

  /* filter list (used by sidebar-style lists) */
  .flist{max-height:172px; overflow:auto; border:1px solid var(--border2); border-radius:10px; padding:6px;}
  .fitem{display:flex; align-items:center; gap:8px; padding:6px 6px; font-size:12.5px; cursor:pointer; border-radius:7px;}
  .fitem:hover{background:#faf6fe;}
  .fitem input{accent-color:var(--pink); width:14px; height:14px;}
  .fitem span{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  .ctrls{display:flex; flex-wrap:wrap; gap:14px 18px; align-items:flex-end;}
  .field{display:flex; flex-direction:column; gap:4px;}
  .field label{font-size:11px; color:var(--muted2); font-weight:500;}
  .field input[type=number], .field input[type=text], .field select{border:1px solid var(--border); border-radius:8px; padding:7px 9px; font-size:12.5px; background:#fff;}
  .field input[type=number]{width:96px;} .field select{min-width:150px;}
  .field.grow{flex:1; min-width:200px;} .field.grow input{width:100%;}

  .btn{border:none; border-radius:9px; padding:8px 14px; font-size:12.5px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
  .btn.grad{background:var(--grad); color:#fff;}
  .btn.grad:disabled{opacity:.45; cursor:not-allowed;}
  .btn.ghost{background:#fff; color:var(--ink); border:1px solid var(--border);}
  .btn.ghost:hover{background:#f6f7f9;}
  .btn.grad-red{background:var(--grad-red); color:#fff;}

  .rowbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:12px 0;}
  .rowbar .spacer{flex:1;}
  .countnote{font-size:11.5px; color:var(--muted); }
  .hint{font-size:11px; color:var(--muted); }

  .tablewrap{overflow:auto; border-radius:12px;}
  table{width:100%; border-collapse:collapse; font-size:12px;}
  thead th{position:sticky; top:0; background:#fbfbfc; text-align:right; padding:10px 12px; border-bottom:1px solid var(--border); white-space:nowrap; color:var(--muted2); font-weight:600; z-index:2;}
  thead th.l{text-align:left;}
  tbody td{padding:9px 12px; border-bottom:1px solid var(--border2); white-space:nowrap; text-align:right;}
  tbody td.l{text-align:left;}
  tbody tr:hover{background:#fcfaff;}
  tbody input{border:1px solid var(--border); border-radius:7px; padding:5px 7px; font-size:12px; width:100%;}
  tbody select{border:1px solid var(--border); border-radius:7px; padding:5px 7px; font-size:12px;}

  .empty{padding:50px 20px; text-align:center; color:var(--muted);}
  .empty .ic{font-size:34px; opacity:.5;}
  .sectitle{font-size:15px; font-weight:700; margin:0 0 12px;}
  .seg{display:inline-flex; background:#f3f4f6; border-radius:9px; padding:3px; gap:2px;}
  .seg button{border:none; background:none; padding:6px 12px; border-radius:7px; font-size:12px; font-weight:600; color:var(--muted2); cursor:pointer;}
  .seg button.active{background:#fff; color:var(--ink); box-shadow:var(--shadow);}
  textarea.kwbox{width:100%; min-height:220px; border:1px solid var(--border); border-radius:12px; padding:14px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; resize:vertical;}
  .banner{background:#fdf2f8; border:1px solid #f6cee2; color:#9d174d; padding:9px 12px; border-radius:10px; font-size:12px; margin-bottom:12px;}
  .hidden{display:none !important;}
  .muted{color:var(--muted);}
</style>

<body>
<div class="wrap">

  <div class="topbar">
    <h1>🏗️ Campaign Builder</h1>
    <div style="display:flex;gap:8px;">
      <a class="backlink" href="Campaign_Map.html">🗺️ Campaign Map</a>
      <a class="backlink" href="index.html">← PPC Analyzer</a>

  </div>

  <div class="rowbar" id="refBulkBar" style="margin-bottom:6px;justify-content:center;">
    <label class="btn ghost" style="cursor:pointer;">⬆ Reference Bulk (optional)<input type="file" id="ref-file" accept=".xlsx,.xls,.csv" class="hidden"></label>
    <span class="hint" id="ref-status">No reference bulk loaded — campaign names will use the manual fields below. Upload your Bulk Operations export to copy naming (and continue numbering) from campaigns that already exist.</span>
  </div>

  <div class="navrow">
    <div class="nav" id="nav"></div>
  </div>

  <main id="app"></main>

  <div style="text-align:center;color:#b9c0cc;font-size:11px;padding:18px 0 34px;">Campaign Builder · build 2026-07-07 15:56</div>
</div>
<script>
'use strict';

/* ============================ helpers ============================ */
const $ = s => document.querySelector(s);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function debounce(fn,ms){ let t; return function(){ clearTimeout(t); t=setTimeout(fn,ms); }; }
function linesOf(s){ return String(s||'').split('\n').map(x=>x.trim()).filter(Boolean); }

/* ============================ Brand Table storage (shared with PPC Analyzer via localStorage) ============================ */
const BT_KEY='ppc_brandtable_v1';
let BT={current:'',accounts:{}};   // accounts[name] = {products:[{brand,niche,name,asin,portfolioId,skus[]}], portfolios:[{name,id}]}
function acctObj(name){ let a=BT.accounts[name]; if(a==null){ a=BT.accounts[name]={products:[],portfolios:[]}; } if(Array.isArray(a)){ a=BT.accounts[name]={products:a,portfolios:[]}; } if(!a.products)a.products=[]; if(!a.portfolios)a.portfolios=[]; return a; }
function btLoad(){ try{ const d=JSON.parse(localStorage.getItem(BT_KEY)); if(d&&d.accounts) BT=d; }catch(e){} Object.keys(BT.accounts||{}).forEach(n=>acctObj(n)); }
function btSave(){ try{ localStorage.setItem(BT_KEY, JSON.stringify(BT)); }catch(e){ alert('Could not save Brand Table (browser storage full?).'); } }
function btAccountOptions(sel){ const names=Object.keys(BT.accounts); return `<option value="">— none —</option>`+names.map(n=>`<option ${sel===n?'selected':''}>${esc(n)}</option>`).join(''); }
// A "dedicated" portfolio (one product/parent) is numbered: "01. …", "24. …". Mixed/branded ones aren't.
function isDedicatedPortfolio(name){ return /^\s*\d/.test(String(name||'')); }
// Dedicated (numbered) portfolios sorted by their leading number; anything else sorted alphabetically after.
function sortPortfolios(list){
  const ded=list.filter(p=>isDedicatedPortfolio(p.name));
  const other=list.filter(p=>!isDedicatedPortfolio(p.name));
  ded.sort((a,b)=>{
    const na=parseInt(String(a.name||'').match(/^\s*(\d+)/)[1],10);
    const nb=parseInt(String(b.name||'').match(/^\s*(\d+)/)[1],10);
    return na-nb || String(a.name||'').localeCompare(String(b.name||''));
  });
  other.sort((a,b)=>String(a.name||a.id).localeCompare(String(b.name||b.id)));
  return [...ded, ...other];
}
// Mixed/branded (non-numbered) portfolios are excluded from selection entirely — they group many parents,
// so there's no single ASIN/naming to inherit from them; only dedicated (numbered) portfolios are selectable.
function btPortfolioOptions(acc,selId){
  const A=(acc&&BT.accounts[acc])?acctObj(acc):null; const all=A?A.portfolios:[];
  const list=sortPortfolios(all.filter(p=>isDedicatedPortfolio(p.name)));
  return `<option value="">— select portfolio —</option>`+list.map(p=>`<option value="${esc(p.id)}" ${String(selId)===String(p.id)?'selected':''}>${esc(p.name||p.id)}</option>`).join('');
}
function rowPortfolioSelect(i, pid, ports){
  const list=sortPortfolios(ports.filter(p=>isDedicatedPortfolio(p.name)));
  const opts = `<option value="">— none —</option>`+list.map(p=>`<option value="${esc(p.id)}" ${String(pid)===String(p.id)?'selected':''}>${esc(p.name||p.id)}</option>`).join('');
  return `<select data-i="${i}" data-pfsel="1" style="width:160px;">${opts}</select>`;
}

/* ============================ app state ============================ */
const S = { tab:'create', btFilter:{portfolio:'', search:''} };
const TABS=[ {id:'brandtable',label:'Brand Table',ic:'🗂️'}, {id:'create',label:'Campaign Builder',ic:'🏗️'}, {id:'singlekw',label:'Single KW Campaigns',ic:'🔑'} ];
function renderNav(){
  $('#nav').innerHTML = TABS.map(t=>`<button class="navbtn ${S.tab===t.id?'active':''}" data-tab="${t.id}"><span>${t.ic}</span>${esc(t.label)}</button>`).join('');
  $('#nav').querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{ S.tab=b.dataset.tab; renderNav(); renderTab(); });
}
function renderTab(){ ({brandtable:renderBrandTable, create:renderCampaignCreate, singlekw:renderSingleKw}[S.tab])(); }

/* ============================ Reference Bulk (optional — powers naming detection) ============================ */
let REF={campaigns:[]}; // {campaignId, campaignName, portfolioName, product}
function normH(h){ return String(h).toLowerCase().replace(/\(.*?informational.*?\)/g,'').replace(/[^a-z0-9]+/g,' ').trim(); }
function parseReferenceBulk(wb){
  REF.campaigns=[];
  wb.SheetNames.forEach(sn=>{
    const ws=wb.Sheets[sn]; const json=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!json.length) return;
    const headers=Object.keys(json[0]);
    const cEntity=headers.find(h=>normH(h)==='entity');
    const cCampName=headers.find(h=>normH(h)==='campaign name');
    if(!cEntity||!cCampName) return;
    const cProduct=headers.find(h=>normH(h)==='product');
    const cCampId=headers.find(h=>normH(h)==='campaign id');
    const cPortName=headers.find(h=>normH(h)==='portfolio name');
    json.forEach(row=>{
      if(String(row[cEntity]||'').trim().toLowerCase()!=='campaign') return;
      const prod = cProduct? (/brand/i.test(row[cProduct])?'SB':'SP') : (/brand/i.test(sn)?'SB':'SP');
      REF.campaigns.push({campaignId:String(cCampId?row[cCampId]:'').trim(), campaignName:String(row[cCampName]||'').trim(), portfolioName:String(cPortName?row[cPortName]:'').trim(), product:prod});
    });
  });
}
function refStatusText(){
  const n=REF.campaigns.length;
  return n? `${n} existing campaign(s) loaded — naming will be copied from matches in the chosen portfolio.` : 'No reference bulk loaded — campaign names will use the manual fields below. Upload your Bulk Operations export to copy naming (and continue numbering) from campaigns that already exist.';
}
// True Amazon Bulk Operations export → false for a hand-made "Brand Table"-style sheet (which has no Entity column).
function looksLikeBulkExport(wb){
  return wb.SheetNames.some(sn=>{
    const json=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});
    return json.length && Object.keys(json[0]).some(h=>normH(h)==='entity');
  });
}
// Pull ASIN/SKU/Portfolio straight out of a real Bulk Operations export (same approach as the PPC Analyzer's
// "Save to Brand Table" bar) — so users can drop their actual bulk file here instead of a hand-curated sheet.
function extractBrandDataFromBulk(wb){
  const campaigns=[], productAds=[];
  wb.SheetNames.forEach(sn=>{
    const ws=wb.Sheets[sn]; const json=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!json.length) return;
    const headers=Object.keys(json[0]);
    const cEntity=headers.find(h=>normH(h)==='entity');
    if(!cEntity) return;
    const cProduct=headers.find(h=>normH(h)==='product');
    const cCampId=headers.find(h=>normH(h)==='campaign id');
    const cPortId=headers.find(h=>normH(h)==='portfolio id');
    const cPortName=headers.find(h=>normH(h)==='portfolio name');
    const cSku=headers.find(h=>normH(h)==='sku');
    const cAsin=headers.find(h=>normH(h).indexOf('asin')!==-1);
    const cState=headers.find(h=>normH(h)==='state');
    json.forEach(row=>{
      const ent=String(row[cEntity]||'').trim().toLowerCase();
      const prod = cProduct? (/brand/i.test(row[cProduct])?'SB':'SP') : (/brand/i.test(sn)?'SB':'SP');
      const campaignId=String(cCampId?row[cCampId]:'').trim();
      const state=String(cState?row[cState]:'').trim().toLowerCase();
      if(ent==='campaign') campaigns.push({campaignId, portfolioId:String(cPortId?row[cPortId]:'').trim(), portfolioName:String(cPortName?row[cPortName]:'').trim(), product:prod, state});
      else if(ent==='product ad') productAds.push({campaignId, asin:String(cAsin?row[cAsin]:'').trim(), sku:String(cSku?row[cSku]:'').trim(), state});
    });
  });
  // Only campaigns actually running (State=enabled) count for portfolio mapping / product extraction —
  // paused/archived campaigns can carry stale ASIN/SKU pairings the user no longer wants to see.
  const campEnabled={}; campaigns.forEach(c=>{ campEnabled[c.campaignId] = c.state==='enabled'; });
  const campToPortfolio={}; campaigns.forEach(c=>{ if(c.portfolioId && campEnabled[c.campaignId]) campToPortfolio[c.campaignId]=c.portfolioId; });
  const pfMap=new Map();
  campaigns.forEach(c=>{ if(!c.portfolioId || !campEnabled[c.campaignId]) return; if(!pfMap.has(c.portfolioId) || (!pfMap.get(c.portfolioId) && c.portfolioName)) pfMap.set(c.portfolioId, c.portfolioName); });
  const portfolios=[...pfMap.entries()].map(([id,name])=>({id,name}));
  const byKey=new Map();
  productAds.forEach(a=>{
    if(a.state!=='enabled' || !campEnabled[a.campaignId]) return;
    const key=(a.asin||a.sku||'').toLowerCase(); if(!key) return;
    if(!byKey.has(key)) byKey.set(key,{asin:a.asin,skus:new Set(),portfolioId:campToPortfolio[a.campaignId]||''});
    const e=byKey.get(key); if(a.sku) e.skus.add(a.sku); if(!e.asin && a.asin) e.asin=a.asin; if(!e.portfolioId && campToPortfolio[a.campaignId]) e.portfolioId=campToPortfolio[a.campaignId];
  });
  const products=[...byKey.values()].map(e=>({brand:'',niche:'',name:'',asin:e.asin,portfolioId:e.portfolioId,skus:[...e.skus]}));
  return {products, portfolios};
}
// Copying an existing campaign's naming verbatim would also copy its stale month/year (e.g. IAN26 from January).
// Find a month-abbreviation+2-digit-year token (English or Romanian) and swap it for the current month.
const MONTH_ABBR={en:['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'],ro:['IAN','FEB','MAR','APR','MAI','IUN','IUL','AUG','SEP','OCT','NOI','DEC']};
function currentMonthYearIn(lang){ const d=new Date(); return MONTH_ABBR[lang][d.getMonth()]+String(d.getFullYear()).slice(2); }
function refreshDateToken(text){
  // NOT \b — "_" counts as a word char in regex, so \b fails right at the underscores in "_IAN26_"
  const re=/(?<![A-Za-z])(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC|IAN|MAI|IUN|IUL|NOI)(\d{2})(?!\d)/i;
  const m=String(text||'').match(re);
  if(!m) return text;
  const abbrUpper=m[1].toUpperCase();
  const lang=MONTH_ABBR.en.includes(abbrUpper)?'en':'ro';
  return text.slice(0,m.index)+currentMonthYearIn(lang)+text.slice(m.index+m[0].length);
}
// Only matches campaigns using the given PREFIX (default BSQ = multi-keyword). Anchoring to the exact prefix
// keeps this from picking up single-keyword conventions like SUP_EXACT when building multi-keyword ones (or vice versa).
function detectNamingTemplate(portfolioName, matchType, product, prefix){
  const mt=String(matchType||'').toUpperCase();
  const prod=product||'SP';
  const pfx=String(prefix||'BSQ');
  const re=new RegExp('^'+pfx+'_'+mt+'(?:_(\\d+))?_(.*)$','i');
  let best=null;
  REF.campaigns.forEach(c=>{
    if(c.product!==prod) return;
    if(portfolioName && (c.portfolioName||'(No Portfolio)')!==portfolioName) return;
    const m=(c.campaignName||'').match(re);
    if(m){ const num=m[1]?parseInt(m[1],10):0; if(!best||num>=best.num) best={prefix:pfx,num,suffix:m[2],fullName:c.campaignName}; }
  });
  return best;
}
function getPortfolioNameById(acc,pid){
  if(!acc||!pid||!BT.accounts[acc]) return '';
  const p=acctObj(acc).portfolios.find(x=>String(x.id)===String(pid));
  return p?(p.name||''):'';
}

/* ============================ BRAND TABLE (master data) ============================ */
function applyBrandFilter(){
  const acc=BT.current, A=acc?acctObj(acc):null; if(!A) return;
  const pf=$('#bt-fportfolio')?$('#bt-fportfolio').value:'';
  const q=($('#bt-fsearch')?$('#bt-fsearch').value:'').toLowerCase().trim();
  let shown=0, total=0;
  document.querySelectorAll('#app tbody tr[data-row]').forEach(tr=>{
    total++;
    const p=A.products[+tr.dataset.row]; let ok=!!p;
    if(ok && pf && String(p.portfolioId)!==pf) ok=false;
    if(ok && q){ const hay=((p.brand||'')+' '+(p.niche||'')+' '+(p.name||'')+' '+(p.asin||'')+' '+((p.skus||[]).join(' '))).toLowerCase(); if(!hay.includes(q)) ok=false; }
    tr.style.display = ok?'':'none'; if(ok) shown++;
  });
  const c=$('#bt-count'); if(c) c.textContent = (pf||q)? `${shown} / ${total} shown` : `${total} products`;
}
function renderBrandTable(){
  const accNames=Object.keys(BT.accounts);
  if(BT.current && !BT.accounts[BT.current]) BT.current='';
  if(!BT.current && accNames.length) BT.current=accNames[0];
  const acc=BT.current; const A= acc? acctObj(acc): null;
  const prods= A? A.products:[]; const ports= A? A.portfolios:[];
  S.btFilter = S.btFilter || {portfolio:'', search:''};
  if(A){ let ch=false; prods.forEach(p=>{ if(!(p.brand||'').trim()){ p.brand=acc; ch=true; } }); if(ch) btSave(); }
  const accSel = `<select id="bt-acc">${accNames.length?accNames.map(n=>`<option ${acc===n?'selected':''}>${esc(n)}</option>`).join(''):'<option value="">(no accounts)</option>'}</select>`;
  const pfFilterOpts = sortPortfolios(ports.filter(p=>isDedicatedPortfolio(p.name))).map(p=>`<option value="${esc(p.id)}" ${S.btFilter.portfolio===String(p.id)?'selected':''}>${esc(p.name||p.id)}</option>`).join('');
  const rowsHtml = prods.map((p,i)=>`<tr data-row="${i}">
    <td class="l">${i+1}</td>
    <td>${rowPortfolioSelect(i, p.portfolioId, ports)}</td>
    <td><input data-i="${i}" data-f="brand" value="${esc(p.brand||'')}" style="width:120px;"></td>
    <td><input data-i="${i}" data-f="niche" value="${esc(p.niche||'')}" placeholder="BNP" style="width:80px;"></td>
    <td><input data-i="${i}" data-f="name" value="${esc(p.name||'')}" style="width:150px;"></td>
    <td><input data-i="${i}" data-f="asin" value="${esc(p.asin||'')}" style="width:120px;"></td>
    <td><input data-i="${i}" data-f="portfolioId" value="${esc(p.portfolioId||'')}" style="width:130px;"></td>
    <td><input data-i="${i}" data-f="skus" value="${esc((p.skus||[]).join(', '))}" style="width:280px;"></td>
    <td class="l"><button class="btn ghost bt-del" data-i="${i}" style="padding:4px 9px;">✕</button></td>
  </tr>`).join('');
  // sort for display, but keep each row's ORIGINAL array index for the edit/delete handlers (data-pi)
  const portsWithIdx = ports.map((p,i)=>({p,i}));
  const sortedPortIdx = [
    ...portsWithIdx.filter(x=>isDedicatedPortfolio(x.p.name)).sort((a,b)=>parseInt(String(a.p.name||'').match(/^\s*(\d+)/)[1],10)-parseInt(String(b.p.name||'').match(/^\s*(\d+)/)[1],10)),
    ...portsWithIdx.filter(x=>!isDedicatedPortfolio(x.p.name)).sort((a,b)=>String(a.p.name||a.p.id).localeCompare(String(b.p.name||b.p.id)))
  ];
  const pfHtml = sortedPortIdx.map(({p,i},row)=>`<tr>
    <td class="l">${row+1}</td>
    <td><input data-pi="${i}" data-pf="name" value="${esc(p.name||'')}" placeholder="e.g. Bookends" style="width:200px;"></td>
    <td><input data-pi="${i}" data-pf="id" value="${esc(p.id||'')}" placeholder="numeric ID" style="width:180px;"></td>
    <td class="l"><button class="btn ghost bt-pdel" data-pi="${i}" style="padding:4px 9px;">✕</button></td>
  </tr>`).join('');
  $('#app').innerHTML=`
    <div class="card pad">
      <div class="rowbar">

function mergeImportedIntoAccount(acc, prods, portfoliosIn){
  const A=acctObj(acc);
  if(A.products.length){
    const rep=confirm(`"${acc}" already has ${A.products.length} product(s).\n\nOK = REPLACE with ${prods.length} imported\nCancel = APPEND the ${prods.length} imported`);
    A.products = rep? prods : A.products.concat(prods);
  } else A.products=prods;
  const have=new Set(A.portfolios.map(p=>String(p.id)));
  (portfoliosIn||[]).forEach(pf=>{ if(pf.id && !have.has(String(pf.id))){ have.add(String(pf.id)); A.portfolios.push({name:pf.name||'',id:String(pf.id)}); } });
  A.products.forEach(p=>{ const id=String(p.portfolioId||'').trim(); if(id && !have.has(id)){ have.add(id); A.portfolios.push({name:'',id}); } });
  btSave(); renderBrandTable();
  return A;
}
function importBrandTable(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const buf=new Uint8Array(ev.target.result);
      const wb=XLSX.read(buf,{type:'array'});

      // 1) Try to detect a hand-curated "Brand Table"-style sheet first (Brand Name + Product Code columns).
      let best=null;
      wb.SheetNames.forEach(sn=>{
        const js=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
        if(!js.length) return;
        const hdr=js[0].map(h=>String(h).toLowerCase());
        if(hdr.some(h=>h.includes('brand'))&&hdr.some(h=>h.includes('product code')||h.includes('asin'))){ if(!best) best={js,hdr}; }
      });
      if(best){
        const {js,hdr}=best;
        const find=preds=>hdr.findIndex(h=>preds.some(p=>h.includes(p)));
        const ci={ brand:find(['brand']), niche:find(['niche']), name:find(['product name']), asin:find(['product code','asin']), port:find(['portfolio']) };
        const skuCols=[]; hdr.forEach((h,idx)=>{ const c=h.replace(/\s/g,''); if(/^sku\d+$/.test(c)||c==='sku') skuCols.push(idx); });
        const asStr=v=> (typeof v==='number')? (Number.isInteger(v)? v.toFixed(0): String(v)) : String(v||'').trim();
        const prods=[];
        for(let i=1;i<js.length;i++){
          const row=js[i]; const g=idx=>idx>=0?row[idx]:'';
          const asin=asStr(g(ci.asin)), brand=asStr(g(ci.brand));
          if(!asin && !brand) continue;
          const skus=skuCols.map(idx=>row[idx]).filter(v=>v!=='' && v!=null).map(asStr);
          prods.push({brand, niche:asStr(g(ci.niche)), name:asStr(g(ci.name)), asin, portfolioId:asStr(g(ci.port)), skus});
        }
        if(prods.length){
          let acc=BT.current;
          if(!acc){ acc=(prompt('Import into which account? (name):','Imported')||'').trim()||'Imported'; BT.current=acc; }
          const A=mergeImportedIntoAccount(acc, prods, []);
          alert(`Imported ${prods.length} product(s) into "${acc}". ${A.portfolios.length} portfolio ID(s) available — add friendly names in the Portfolios section.`);
          return;
        }
      }

      // 2) Not a Brand Table sheet — is it an actual Amazon Bulk Operations export? Extract ASIN/SKU/Portfolio
      //    from it directly (same logic the PPC Analyzer uses), so you can drop your real bulk file here too.
      if(looksLikeBulkExport(wb)){
        const bd=extractBrandDataFromBulk(wb);
        if(!bd.products.length && !bd.portfolios.length){ alert('This looks like a Bulk Operations file, but no Product ad / Campaign rows with ASIN, SKU or Portfolio data were found in it.'); return; }
        let acc=BT.current;
        if(!acc){ acc=(prompt('Import into which account? (name):', file.name.replace(/\.[^.]+$/,''))||'').trim()||'Imported'; BT.current=acc; }
        const A=mergeImportedIntoAccount(acc, bd.products, bd.portfolios);
        parseReferenceBulk(wb); // bonus: same file also sets up naming detection for this session
        alert(`Imported from your Bulk Operations file: ${bd.products.length} product(s), ${bd.portfolios.length} portfolio(s) into "${acc}". Naming detection is also set up from this file (${REF.campaigns.length} campaign(s)).`);
        return;
      }

      alert('No product rows found. Expected either a "Brand Table"-style sheet (Brand Name / Product Code columns) or an Amazon Bulk Operations export (has an Entity column).');
    }catch(err){ console.error(err); alert('Import error: '+err.message); }
  };
  r.readAsArrayBuffer(file);
}

/* ============================ CAMPAIGN BUILDER ============================ */
function currentMonthYear(){ const M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC']; const d=new Date(); return M[d.getMonth()]+String(d.getFullYear()).slice(2); }
let CFG=null;
function ensureBuilderInit(){ if(!CFG){ CFG={type:'manual',m_exact:true,m_phrase:false,m_broad:false,prefix:'BSQ',tip:'BRND',brand:'',asin:'',agent:'',budget:'10',monthyear:currentMonthYear(),bid:'0.75',strategy:'Dynamic bids - down only',tos:'0',portfolioId:'',agency:'Insiders®',separator:'_',skus:'',keywords:'',targetAsins:'',ptExpanded:false,perCampaign:'',startNum:'1',startNumTouched:false,btAccount:'',childSel:{},autoClose:true,autoLoose:true,autoSub:true,autoComp:true,ignoreNaming:false}; } return CFG; }
const AUTO_GROUPS=[{key:'autoClose',expr:'close-match',label:'Close Match'},{key:'autoLoose',expr:'loose-match',label:'Loose Match'},{key:'autoSub',expr:'substitutes',label:'Substitutes'},{key:'autoComp',expr:'complements',label:'Complements'}];
function selectedMatches(cfg){ if(cfg.type==='auto') return ['AUTO']; if(cfg.type==='pt') return ['PAT']; const r=[]; if(cfg.m_exact)r.push('EXACT'); if(cfg.m_phrase)r.push('PHRASE'); if(cfg.m_broad)r.push('BROAD'); return r; }
function manualName(cfg,match,num){
  // Product Targeting campaigns use "PAT 1", "PAT 2" (prefix + space + number, no duplicate match segment)
  // instead of the usual "PREFIX_MATCH_NUM" pattern.
  const first = cfg.type==='pt'? (num!=null? `${cfg.prefix} ${num}` : String(cfg.prefix)) : null;
  const parts = first!=null? [first] : (()=>{ const p=[cfg.prefix,match]; if(num!=null) p.push(String(num)); return p; })();
  parts.push(cfg.tip,cfg.brand,cfg.asin,cfg.agent,cfg.monthyear,cfg.agency);
  return parts.map(x=>String(x==null?'':x).trim()).filter(x=>x!=='').join(cfg.separator||'_');
}
// ignoreNaming lets the user force the manual fields even when an existing campaign's naming could be copied —
// needed because the copied suffix can carry over stale/typo'd segments (e.g. a duplicated day code) from real data.
function templateFor(cfg,match){
  if(cfg.ignoreNaming) return null;
  if(!match||match==='AUTO') return null;
  const pfName=getPortfolioNameById(cfg.btAccount, cfg.portfolioId);
  if(!pfName) return null;
  return detectNamingTemplate(pfName, match, 'SP', cfg.prefix);
}
// If a naming template was found (an existing campaign with this prefix/match in this portfolio), copy its
// suffix (with the month/year refreshed) instead of the manual fields — same principle as Harvesting.
function buildName(cfg,match,num){
  const tmpl=templateFor(cfg,match);
  if(tmpl){
    const suffix=refreshDateToken(tmpl.suffix);
    const first = cfg.type==='pt'? (num!=null? `${tmpl.prefix} ${num}` : String(tmpl.prefix)) : null;
    const parts = first!=null? [first] : (()=>{ const p=[tmpl.prefix,match]; if(num!=null) p.push(String(num)); return p; })();
    parts.push(suffix);
    return parts.filter(x=>x!=='').join(cfg.separator||'_');
  }
  return manualName(cfg,match,num);
}
function kwGroups(cfg){
  if(cfg.type==='auto') return [[]];
  const list = cfg.type==='pt'? linesOf(cfg.targetAsins) : linesOf(cfg.keywords);
  const per=Math.max(0,parseInt(cfg.perCampaign||0)||0);
  if(per<=0) return [list];
  const g=[]; for(let i=0;i<list.length;i+=per) g.push(list.slice(i,i+per));
  return g.length?g:[[]];
}
function getPortfolioChildren(acc,pid){
  if(!acc||!pid||!BT.accounts[acc]) return [];
  const A=acctObj(acc);
  return A.products.map((p,idx)=>({idx,p})).filter(x=>String(x.p.portfolioId)===String(pid));
}
function recomputeSkusFromChildren(cfg){
  const children=getPortfolioChildren(cfg.btAccount, cfg.portfolioId);
  const skus=[];
  children.forEach(c=>{ if(cfg.childSel[c.idx]!==false){ (c.p.skus||[]).forEach(s=>{ if(s && !skus.includes(s)) skus.push(s); }); } });
  cfg.skus=skus.join('\n');
}
function buildCampaignRows(cfg){
  const out=[]; const matches=selectedMatches(cfg);
  const skus=linesOf(cfg.skus);
  const per=Math.max(0,parseInt(cfg.perCampaign||0)||0);
  const start=Math.max(1,parseInt(cfg.startNum||1)||1);
  const numbered = cfg.type!=='auto' && per>0;
  const existingNames=new Set(REF.campaigns.map(c=>c.campaignName));
  matches.forEach(match=>{
    const groups=kwGroups(cfg);
    groups.forEach((grp,gi)=>{
      const num = numbered? start+gi : null;
      let cname=buildName(cfg,match,num);
      if(numbered){ let n2=num; while(existingNames.has(cname)){ n2++; cname=buildName(cfg,match,n2); } }
      else { let base=cname, v=1; while(existingNames.has(cname)){ v++; cname=base+'_'+v; } }
      existingNames.add(cname);
      const agname=cname; // Ad Group ID/name = campaign name, no "_AG" suffix
      const c={'Product':'Sponsored Products','Entity':'Campaign','Operation':'Create','Campaign ID':cname,'Campaign Name':cname,'Targeting Type':cfg.type==='auto'?'Auto':'Manual','State':'enabled','Daily Budget':cfg.budget,'Bidding Strategy':cfg.strategy};
      if(String(cfg.portfolioId||'').trim()) c['Portfolio ID']=cfg.portfolioId.trim();
      out.push(bulkRow(c));
      if(+cfg.tos>0) out.push(bulkRow({'Product':'Sponsored Products','Entity':'Bidding Adjustment','Operation':'Create','Campaign ID':cname,'Placement':'Placement Top','Percentage':cfg.tos}));
      out.push(bulkRow({'Product':'Sponsored Products','Entity':'Ad Group','Operation':'Create','Campaign ID':cname,'Ad Group ID':agname,'Ad Group Name':agname,'State':'enabled','Ad Group Default Bid':cfg.bid}));
      (skus.length?skus:['']).forEach(sku=>out.push(bulkRow({'Product':'Sponsored Products','Entity':'Product ad','Operation':'Create','Campaign ID':cname,'Ad Group ID':agname,'State':'enabled','SKU':sku})));
      if(cfg.type==='auto'){
        AUTO_GROUPS.forEach(g=>{ if(cfg[g.key]) out.push(bulkRow({'Product':'Sponsored Products','Entity':'Product Targeting','Operation':'Create','Campaign ID':cname,'Ad Group ID':agname,'State':'enabled','Bid':cfg.bid,'Product Targeting Expression':g.expr})); });
      } else if(cfg.type==='pt'){
        grp.forEach(asin=>{ const a=String(asin).trim().toUpperCase(); if(!a) return; const expr=cfg.ptExpanded?`asin-expanded="${a}"`:`asin="${a}"`; out.push(bulkRow({'Product':'Sponsored Products','Entity':'Product Targeting','Operation':'Create','Campaign ID':cname,'Ad Group ID':agname,'State':'enabled','Bid':cfg.bid,'Product Targeting Expression':expr})); });
      } else grp.forEach(kw=>out.push(bulkRow({'Product':'Sponsored Products','Entity':'Keyword','Operation':'Create','Campaign ID':cname,'Ad Group ID':agname,'State':'enabled','Keyword Text':kw,'Match Type':match.charAt(0)+match.slice(1).toLowerCase(),'Bid':cfg.bid})));
    });
  });
  return out;
}
function builderIssues(cfg){
  const iss=[]; const matches=selectedMatches(cfg);
  if(!matches.length) iss.push('Select at least one match type.');
  const hasTemplate=matches.some(m=>templateFor(cfg,m));
  if(!hasTemplate && !String(cfg.brand).trim() && !String(cfg.asin).trim()) iss.push('Enter a Brand/Niche or ASIN for the campaign name (or upload a Reference Bulk to copy naming from an existing campaign).');
  if(cfg.type==='manual' && !linesOf(cfg.keywords).length) iss.push('Enter at least one keyword (manual campaigns).');
  if(cfg.type==='pt' && !linesOf(cfg.targetAsins).length) iss.push('Enter at least one ASIN to target.');
  if(cfg.type==='auto' && !AUTO_GROUPS.some(g=>cfg[g.key])) iss.push('Select at least one auto targeting group (Close Match / Loose Match / Substitutes / Complements).');
  if(!linesOf(cfg.skus).length) iss.push('Select a portfolio (or add SKUs manually) — at least one SKU is required.');
  return iss;
}
function namingBannerHtml(cfg){
  const matches=selectedMatches(cfg);
  if(cfg.type==='auto'||!matches.length) return '';
  const m=matches[0];
  if(cfg.ignoreNaming) return `Ignoring existing naming (checkbox below) — campaigns will use the manual fields below, regardless of what's already in this portfolio.`;
  const tmpl=templateFor(cfg,m);
  if(tmpl){
    const suffix=refreshDateToken(tmpl.suffix);
    return `Found existing naming in this portfolio: <b>${esc(tmpl.fullName)}</b> → campaigns will use <b>${esc(tmpl.prefix)}_${esc(m)}_…_${esc(suffix)}</b> (month/year refreshed to the current one, no duplicates).${matches.length>1?' Other checked match types are matched independently.':''}`;
  }
  return REF.campaigns.length? `No existing ${esc(m)} campaign with prefix "${esc(cfg.prefix)}" found in this portfolio — using the manual fields below.` : `No Reference Bulk loaded — using the manual fields below. Upload one (top of page) to copy naming from an existing campaign.`;
}

function updateBuilderOutputs(){
  const cfg=CFG; if(!cfg) return;
  const matches=selectedMatches(cfg);
  const per=Math.max(0,parseInt(cfg.perCampaign||0)||0);
  const start=Math.max(1,parseInt(cfg.startNum||1)||1);
  const numbered=cfg.type!=='auto'&&per>0;
  const groups=kwGroups(cfg);
  const names=[];
  matches.forEach(m=>groups.forEach((grp,gi)=>{ const num=numbered?start+gi:null; names.push({name:buildName(cfg,m,num), kw: (per===1&&grp.length)?grp[0]:null}); }));
  const shown=names.slice(0,30).map(n=>`📁 ${esc(n.name)}${n.kw?` <span style="color:#9aa3af;">→ ${esc(n.kw)}</span>`:''}<br><span style="color:#c3c3cc;">   └ Ad Group: ${esc(n.name)}</span>`).join('<br>');
  $('#cc-names').innerHTML = names.length? shown+(names.length>30?`<br><span class="muted">…+${names.length-30} more campaigns</span>`:'') : '<span class="muted">Select a match type to preview names.</span>';
  const bannerEl=$('#cc-naming-banner'); if(bannerEl) bannerEl.innerHTML=namingBannerHtml(cfg);
  const skus=linesOf(cfg.skus).length, kws=linesOf(cfg.keywords).length, asins=linesOf(cfg.targetAsins).length;
  const nCamp=names.length, nAds=nCamp*Math.max(1,skus);
  const nGroups=AUTO_GROUPS.filter(g=>cfg[g.key]).length, nKw=matches.length*kws, nPt=matches.length*asins;
  const targetSummary = cfg.type==='auto'? ` · ${nCamp*nGroups} auto targeting row(s) (${nGroups} group(s)/campaign)`
    : cfg.type==='pt'? ` · ${nPt} product targeting row(s)`
    : ` · ${nKw} keyword(s)`;
  $('#cc-summary').textContent = `Will create: ${nCamp} campaign(s) · ${nCamp} ad group(s) · ${nAds} product ad(s)${targetSummary}`;
  const iss=builderIssues(cfg);
  $('#cc-issues').innerHTML = iss.length? `<span style="color:#dc2626;">⚠ ${esc(iss[0])}</span>`:'<span style="color:#15803d;">✓ Ready to export</span>';
  const exp=$('#cc-export'); if(exp) exp.disabled = iss.length>0;
  const rows=buildCampaignRows(cfg);
  const H=BULK_HEADERS, ix=n=>H.indexOf(n);
  const pr=rows.map(r=>({entity:r[ix('Entity')],campaign:r[ix('Campaign Name')]||r[ix('Campaign ID')],ag:r[ix('Ad Group ID')],detail:r[ix('Keyword Text')]||r[ix('SKU')]||r[ix('Placement')]||r[ix('Product Targeting Expression')]||'',match:r[ix('Match Type')]||'',bid:r[ix('Bid')]||r[ix('Ad Group Default Bid')]||r[ix('Daily Budget')]||r[ix('Percentage')]||''}));
  let h='<div class="tablewrap"><table><thead><tr><th class="l">Entity</th><th class="l">Campaign</th><th class="l">Ad Group</th><th class="l">Keyword / SKU / Placement</th><th class="l">Match</th><th>Bid / Budget</th></tr></thead><tbody>';
  pr.slice(0,300).forEach(r=>{ h+=`<tr><td class="l"><b>${esc(r.entity)}</b></td><td class="l">${esc(r.campaign)}</td><td class="l">${esc(r.ag)}</td><td class="l">${esc(r.detail)}</td><td class="l">${esc(r.match)}</td><td>${esc(r.bid)}</td></tr>`; });
  if(!pr.length) h+='<tr><td colspan="6" class="l" style="padding:22px;color:#9aa3af;text-align:center;">Fill in the setup above to see the rows that will be generated.</td></tr>';
  h+='</tbody></table></div>';
  if(pr.length>300) h+=`<div class="countnote" style="margin-top:6px;">Showing first 300 of ${pr.length} rows — export includes all.</div>`;
  $('#cc-preview').innerHTML=h;
}

let SKW=null;
function ensureSkwInit(){ if(!SKW){ SKW={prefix:'SUP',matchType:'EXACT',tip:'BRND',brand:'',asin:'',agent:'',monthyear:currentMonthYear(),agency:'Insiders®',separator:'_',budget:'10',bid:'0.75',strategy:'Dynamic bids - down only',tos:'0',portfolioId:'',skus:'',keywords:'',btAccount:'',childSel:{}}; } return SKW; }
function slugifyKeyword(kw){ return String(kw||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,40)||'keyword'; }
// Unlike the multi-keyword tab (where a clean numeric token reliably marks "here's the number, rest is static
// suffix"), single-keyword campaign names conflate the keyword text and the static suffix with no delimiter.
// So this REQUIRES an explicit number right after the match type (e.g. "SUP_EXACT_1_…") to anchor where the
// static part starts — without that anchor we can't tell a keyword apart from suffix text, and a wrong guess
// would compound (an already-generated single-kw campaign could get mistaken for "the template" next time).
function detectSkwSuffix(portfolioName, matchType, product, prefix){
  const mt=String(matchType||'').toUpperCase();
  const prod=product||'SP';
  const pfx=String(prefix||'SUP');
  const re=new RegExp('^'+pfx+'_'+mt+'_(\\d+)_(.*)$','i');
  let found=null;
  REF.campaigns.forEach(c=>{
    if(found) return;
    if(c.product!==prod) return;
    if(portfolioName && (c.portfolioName||'(No Portfolio)')!==portfolioName) return;
    const m=(c.campaignName||'').match(re);
    if(m) found={suffix:m[2], fullName:c.campaignName};
  });
  return found;
}
function skwTemplate(cfg){
  const pfName=getPortfolioNameById(cfg.btAccount, cfg.portfolioId);
  if(!pfName) return null;
  return detectSkwSuffix(pfName, cfg.matchType, 'SP', cfg.prefix);
}
// The keyword is ALWAYS embedded in the name — with a detected template (suffix copied + date refreshed)
// or, failing that, with the manual fields — either way the keyword itself is never optional.
function buildSkwName(cfg, keyword, template){
  const slug=slugifyKeyword(keyword);
  const sep=cfg.separator||'_';
  if(template){ const suffix=refreshDateToken(template.suffix); return [cfg.prefix, cfg.matchType, slug, suffix].filter(x=>x!=='').join(sep); }
  return [cfg.prefix, cfg.matchType, slug, cfg.tip, cfg.brand, cfg.asin, cfg.agent, cfg.monthyear, cfg.agency].map(x=>String(x==null?'':x).trim()).filter(x=>x!=='').join(sep);
}
function skwIssues(cfg){
  const iss=[];
  if(!linesOf(cfg.keywords).length) iss.push('Enter at least one keyword — one campaign will be created per line.');
  if(!linesOf(cfg.skus).length) iss.push('Select a portfolio (or add SKUs manually) — at least one SKU is required.');
  const tmpl=skwTemplate(cfg);
  if(!tmpl && !String(cfg.brand).trim() && !String(cfg.asin).trim()) iss.push('Enter a Brand/Niche or ASIN for the campaign name (or upload a Reference Bulk to copy naming from an existing campaign).');
  return iss;
}
function buildSkwRows(cfg){
  const out=[]; const kws=linesOf(cfg.keywords); const skus=linesOf(cfg.skus);
  const template=skwTemplate(cfg);
  const matchTypeCap=cfg.matchType.charAt(0)+cfg.matchType.slice(1).toLowerCase();
  const existingNames=new Set(REF.campaigns.map(c=>c.campaignName));
  kws.forEach(kw=>{
    let cname=buildSkwName(cfg,kw,template);
    let base=cname, v=1; while(existingNames.has(cname)){ v++; cname=base+'_'+v; }
    existingNames.add(cname);
    const agname=cname; // Ad Group ID/name = campaign name, no "_AG" suffix
    const c={'Product':'Sponsored Products','Entity':'Campaign','Operation':'Create','Campaign ID':cname,'Campaign Name':cname,'Targeting Type':'Manual','State':'enabled','Daily Budget':cfg.budget,'Bidding Strategy':cfg.strategy};
    if(String(cfg.portfolioId||'').trim()) c['Portfolio ID']=cfg.portfolioId.trim();
    out.push(bulkRow(c));
    if(+cfg.tos>0) out.push(bulkRow({'Product':'Sponsored Products','Entity':'Bidding Adjustment','Operation':'Create','Campaign ID':cname,'Placement':'Placement Top','Percentage':cfg.tos}));
    out.push(bulkRow({'Product':'Sponsored Products','Entity':'Ad Group','Operation':'Create','Campaign ID':cname,'Ad Group ID':agname,'Ad Group Name':agname,'State':'enabled','Ad Group Default Bid':cfg.bid}));
    (skus.length?skus:['']).forEach(sku=>out.push(bulkRow({'Product':'Sponsored Products','Entity':'Product ad','Operation':'Create','Campaign ID':cname,'Ad Group ID':agname,'State':'enabled','SKU':sku})));
    out.push(bulkRow({'Product':'Sponsored Products','Entity':'Keyword','Operation':'Create','Campaign ID':cname,'Ad Group ID':agname,'State':'enabled','Keyword Text':kw,'Match Type':matchTypeCap,'Bid':cfg.bid}));
  });
  return out;
}
function skwNamingBannerHtml(cfg){
  const tmpl=skwTemplate(cfg);
  if(tmpl){ const suffix=refreshDateToken(tmpl.suffix); return `Found existing naming in this portfolio: <b>${esc(tmpl.fullName)}</b> → campaigns will be <b>${esc(cfg.prefix)}_${esc(cfg.matchType)}_{keyword}_${esc(suffix)}</b> (month/year refreshed, no duplicates).`; }

  const bindText=(id,key)=>{ const e=$('#'+id); e.oninput=()=>{ cfg[key]=e.value; upd(); }; };
  bindText('skw-prefix','prefix'); bindText('skw-tip','tip'); bindText('skw-brand','brand'); bindText('skw-asin','asin');
  bindText('skw-agent','agent'); bindText('skw-my','monthyear'); bindText('skw-agency','agency'); bindText('skw-sep','separator');
  bindText('skw-budget','budget'); bindText('skw-bid','bid'); bindText('skw-tos','tos');
  bindText('skw-port','portfolioId'); bindText('skw-skus','skus'); bindText('skw-kw','keywords');
  $('#skw-match').onchange=e=>{ cfg.matchType=e.target.value; upd(); };
  $('#skw-strat').onchange=e=>{ cfg.strategy=e.target.value; };
  $('#skw-acc').onchange=e=>{ cfg.btAccount=e.target.value; cfg.portfolioId=''; cfg.childSel={}; cfg.skus=''; renderSingleKw(); };
  $('#skw-pf').onchange=e=>{
    cfg.portfolioId=e.target.value;
    const A = cfg.btAccount && BT.accounts[cfg.btAccount] ? acctObj(cfg.btAccount) : null;
    const pf = A ? A.portfolios.find(p=>String(p.id)===String(e.target.value)) : null;
    if(pf){
      const nm = pf.name||'';
      const isMixed = /\bmixed\b|alle\s*produkte|all\s*products/i.test(nm);
      const m = nm.match(/B0[A-Z0-9]{8}/i);
      if(!isMixed && m) cfg.asin = m[0].toUpperCase();
    }
    const kids = getPortfolioChildren(cfg.btAccount, cfg.portfolioId);
    cfg.childSel={}; kids.forEach(c=>cfg.childSel[c.idx]=true);
    if(!String(cfg.brand||'').trim()){ const withNiche=kids.find(c=>String(c.p.niche||'').trim()); if(withNiche) cfg.brand=withNiche.p.niche; }
    recomputeSkusFromChildren(cfg);
    renderSingleKw();
  };
  document.querySelectorAll('[data-schild]').forEach(cb=>cb.onchange=()=>{
    cfg.childSel[+cb.dataset.schild]=cb.checked;
    recomputeSkusFromChildren(cfg);
    $('#skw-skus').value=cfg.skus;
    updateSkwOutputs();
  });
  $('#skw-export').onclick=exportSkwCampaigns;
  updateSkwOutputs();
}
function updateSkwOutputs(){
  const cfg=SKW; if(!cfg) return;
  const kws=linesOf(cfg.keywords);
  const template=skwTemplate(cfg);
  const names=kws.map(kw=>({name:buildSkwName(cfg,kw,template), kw}));
  const shown=names.slice(0,30).map(n=>`📁 ${esc(n.name)} <span style="color:#9aa3af;">→ ${esc(n.kw)}</span>`).join('<br>');
  $('#skw-names').innerHTML = names.length? shown+(names.length>30?`<br><span class="muted">…+${names.length-30} more campaigns</span>`:'') : '<span class="muted">Enter keywords to preview names.</span>';
  const skus=linesOf(cfg.skus).length;
  $('#skw-summary').textContent = `Will create: ${names.length} campaign(s) · ${names.length} ad group(s) · ${names.length*Math.max(1,skus)} product ad(s) · ${names.length} keyword(s)`;
  const bannerEl=$('#skw-naming-banner'); if(bannerEl) bannerEl.innerHTML=skwNamingBannerHtml(cfg);
  const iss=skwIssues(cfg);
  $('#skw-issues').innerHTML = iss.length? `<span style="color:#dc2626;">⚠ ${esc(iss[0])}</span>`:'<span style="color:#15803d;">✓ Ready to export</span>';
  const exp=$('#skw-export'); if(exp) exp.disabled = iss.length>0;
  const rows=buildSkwRows(cfg);
  const H=BULK_HEADERS, ix=n=>H.indexOf(n);
  const pr=rows.map(r=>({entity:r[ix('Entity')],campaign:r[ix('Campaign Name')]||r[ix('Campaign ID')],ag:r[ix('Ad Group ID')],detail:r[ix('Keyword Text')]||r[ix('SKU')]||r[ix('Placement')]||'',match:r[ix('Match Type')]||'',bid:r[ix('Bid')]||r[ix('Ad Group Default Bid')]||r[ix('Daily Budget')]||r[ix('Percentage')]||''}));
  let h='<div class="tablewrap"><table><thead><tr><th class="l">Entity</th><th class="l">Campaign</th><th class="l">Ad Group</th><th class="l">Keyword / SKU / Placement</th><th class="l">Match</th><th>Bid / Budget</th></tr></thead><tbody>';
  pr.slice(0,300).forEach(r=>{ h+=`<tr><td class="l"><b>${esc(r.entity)}</b></td><td class="l">${esc(r.campaign)}</td><td class="l">${esc(r.ag)}</td><td class="l">${esc(r.detail)}</td><td class="l">${esc(r.match)}</td><td>${esc(r.bid)}</td></tr>`; });
  if(!pr.length) h+='<tr><td colspan="6" class="l" style="padding:22px;color:#9aa3af;text-align:center;">Enter keywords above to see the rows that will be generated.</td></tr>';
  h+='</tbody></table></div>';
  if(pr.length>300) h+=`<div class="countnote" style="margin-top:6px;">Showing first 300 of ${pr.length} rows — export includes all.</div>`;
  $('#skw-preview').innerHTML=h;
}
function exportSkwCampaigns(){
  const cfg=SKW; const iss=skwIssues(cfg);
  if(iss.length){ alert('Please fix before export:\n\n• '+iss.join('\n• ')); return; }
  const rows=buildSkwRows(cfg);
  writeBulk(rows, 'single_kw_campaigns_bulk.xlsx');
}

/* ============================ exports ============================ */
const BULK_HEADERS=["Product","Entity","Operation","Campaign ID","Ad Group ID","Portfolio ID","Ad ID","Keyword ID","Product Targeting ID","Campaign Name","Ad Group Name","Start Date","End Date","Targeting Type","State","Daily Budget","SKU","Ad Group Default Bid","Bid","Keyword Text","Native Language Keyword","Native Language Locale","Match Type","Bidding Strategy","Placement","Percentage","Product Targeting Expression"];
function bulkRow(f){ return BULK_HEADERS.map(h=>f[h]!==undefined?f[h]:''); }
function writeBulk(rows,filename,sheet){ const aoa=[BULK_HEADERS,...rows]; const ws=XLSX.utils.aoa_to_sheet(aoa); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,sheet||'Sponsored Products Campaigns'); XLSX.writeFile(wb,filename); }
function exportCreatedCampaigns(){
  const cfg=ensureBuilderInit(); const iss=builderIssues(cfg);
  if(iss.length){ alert('Please fix before export:\n\n• '+iss.join('\n• ')); return; }
  const rows=buildCampaignRows(cfg);
  const fn=(buildName(cfg,selectedMatches(cfg)[0])||'campaigns').replace(/[^a-z0-9_]+/gi,'_').slice(0,50);
  writeBulk(rows, fn+'_bulk.xlsx');
}

/* ============================ init ============================ */
btLoad();
renderNav(); renderTab();
$('#ref-file').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      parseReferenceBulk(wb);
      $('#ref-status').textContent=refStatusText();
      if(S.tab==='create'||S.tab==='singlekw') renderTab();
    }catch(err){ console.error(err); $('#ref-status').textContent='Error reading reference bulk: '+err.message; }
  };
  r.readAsArrayBuffer(f);
};
</script>
